<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro | Spotify Album Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <nav class="navbar topbar">
            <div class="container-fluid px-4">
                <a class="brand-mark" href="{{ url_for('index') }}">
                    <span class="brand-dot">♪</span>
                    <span>Album Compare</span>
                </a>
                {% if session.get("authenticated") %}
                    <form action="{{ url_for('logout') }}" method="POST" class="ms-auto">
                        <button type="submit" class="btn nav-action btn-sm">Sair</button>
                    </form>
                {% endif %}
            </div>
        </nav>

        <main class="auth-wrap">
            <section class="panel error-panel text-center">
                <p class="eyebrow mb-2">Erro</p>
                <h1 class="section-title mb-3">Não foi possível concluir a operação</h1>
                <p class="muted-copy mb-4">{{ message }}</p>
                <a href="{{ url_for('index') }}" class="btn btn-spotify">Voltar ao início</a>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
