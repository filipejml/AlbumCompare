<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Spotify Album Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <nav class="navbar topbar">
            <div class="container-fluid px-4">
                <a class="brand-mark" href="{{ url_for('login') }}">
                    <span class="brand-dot">♪</span>
                    <span>Album Compare</span>
                </a>
            </div>
        </nav>

        <main class="auth-wrap">
            <section class="panel auth-panel">
                <p class="eyebrow mb-2">Novo acesso</p>
                <h1 class="page-title mb-3">Cadastrar</h1>
                <p class="muted-copy mb-4">Crie um usuário local para entrar na aplicação.</p>

                {% if error_message %}
                    <div class="alert alert-danger" role="alert">{{ error_message }}</div>
                {% endif %}

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário</label>
                        <input type="text" class="form-control" id="username" name="username" autocomplete="username" minlength="3" maxlength="40" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" minlength="6" required>
                    </div>

                    <div class="mb-4">
                        <label for="password_confirmation" class="form-label">Confirmar senha</label>
                        <input type="password" class="form-control" id="password_confirmation" name="password_confirmation" autocomplete="new-password" minlength="6" required>
                    </div>

                    <button type="submit" class="btn btn-spotify w-100">Cadastrar</button>
                </form>

                <div class="text-center mt-4">
                    <a href="{{ url_for('login') }}" class="link-success fw-semibold">Voltar para o login</a>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
