<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Album Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <nav class="navbar topbar sticky-top">
            <div class="container-fluid px-4">
                <a class="brand-mark" href="{{ url_for('index') }}">
                    <span class="brand-dot">♪</span>
                    <span>Album Compare</span>
                </a>
                <form action="{{ url_for('logout') }}" method="POST" class="ms-auto">
                    <button type="submit" class="btn nav-action btn-sm">Sair</button>
                </form>
            </div>
        </nav>

        <main class="page-wrap">
            <section class="panel compare-panel">
                <div class="row g-4 align-items-end mb-4">
                    <div class="col-lg-8">
                        <p class="eyebrow mb-2">Biblioteca Spotify</p>
                        <h1 class="page-title">Compare álbuns</h1>
                    </div>
                    <div class="col-lg-4">
                        <p class="muted-copy mb-0">Pesquise um artista, escolha dois lançamentos e veja o que cada versão tem em comum ou de exclusivo.</p>
                    </div>
                </div>

                <form id="artistForm" class="mb-4">
                    <label for="artistSearch" class="form-label">Artista</label>
                    <input type="text" class="form-control" id="artistSearch" placeholder="Digite pelo menos 3 caracteres" autocomplete="off">
                    <ul id="artistResults" class="list-group artist-results mt-2 d-none"></ul>
                </form>

                <form id="albumForm" action="/compare" method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="album1" class="form-label">Álbum 1</label>
                            <select class="form-select" id="album1" name="album1" required>
                                <option value="">Selecione um artista primeiro</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="album2" class="form-label">Álbum 2</label>
                            <select class="form-select" id="album2" name="album2" required>
                                <option value="">Selecione um artista primeiro</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-spotify mt-4">Comparar álbuns</button>
                </form>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        $(document).ready(function() {
            const artistResults = $('#artistResults');
            const album1 = $('#album1');
            const album2 = $('#album2');

            function setAlbumPlaceholder(text) {
                album1.empty().append($('<option>', { value: '', text: text }));
                album2.empty().append($('<option>', { value: '', text: text }));
            }

            $('#artistSearch').on('input', function() {
                const query = $(this).val().trim();
                artistResults.empty().addClass('d-none');

                if (query.length < 3) {
                    setAlbumPlaceholder('Selecione um artista primeiro');
                    return;
                }

                $.get('/search_artist', { query: query }, function(data) {
                    artistResults.empty();

                    if (!data.artists.length) {
                        artistResults
                            .append($('<li>', {
                                class: 'list-group-item artist-result',
                                text: 'Nenhum artista encontrado'
                            }))
                            .removeClass('d-none');
                        return;
                    }

                    data.artists.forEach(artist => {
                        const imageUrl = artist.images.length > 0 ? artist.images[0].url : 'https://placehold.co/96x96/181818/b3b3b3?text=%E2%99%AA';
                        const item = $('<li>', {
                            class: 'list-group-item artist-result d-flex align-items-center gap-3',
                            tabindex: 0
                        }).data('id', artist.id);

                        $('<img>', { src: imageUrl, alt: artist.name }).appendTo(item);
                        $('<span>', { text: artist.name, class: 'fw-semibold' }).appendTo(item);
                        artistResults.append(item);
                    });

                    artistResults.removeClass('d-none');
                });
            });

            artistResults.on('click keydown', '.artist-result', function(event) {
                if (event.type === 'keydown' && event.key !== 'Enter') {
                    return;
                }

                const artistId = $(this).data('id');
                const artistName = $(this).find('span').text();
                if (!artistId) {
                    return;
                }

                $('#artistSearch').val(artistName);
                artistResults.empty().addClass('d-none');
                setAlbumPlaceholder('Carregando álbuns...');

                $.get('/get_albums', { artist_id: artistId }, function(data) {
                    album1.empty();
                    album2.empty();

                    if (!data.albums.length) {
                        setAlbumPlaceholder('Nenhum álbum disponível');
                        return;
                    }

                    data.albums.forEach(album => {
                        album1.append($('<option>', { value: album.id, text: album.name }));
                        album2.append($('<option>', { value: album.id, text: album.name }));
                    });
                });
            });
        });
    </script>
</body>
</html>
